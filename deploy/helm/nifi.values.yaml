# Cluster-specific overrides for the NiFi Helm chart.
#
# The chart bootstraps NiFi conf, drivers, schemas, user scripts, and Python
# extensions from the custom CogStack NiFi image. Keep this file focused on
# cluster-specific overrides such as storage classes, ingress, certificates,
# image tags, and replica counts.

certificates:
  existingSecret: nifi-certs

