nameOverride: ""
fullnameOverride: ""

configFiles:
  # Optional overrides. If empty, chart falls back to files/*.yml and files/log4j2.properties.
  # Use:
  #   --set-file configFiles.opensearchRaw=./services/elasticsearch/config/opensearch.yml
  #   --set-file configFiles.log4jRaw=./services/elasticsearch/config/log4j2_opensearch.properties
  #   --set-file configFiles.dashboardsRaw=./services/kibana/config/opensearch.yml
  opensearchRaw: ""
  log4jRaw: ""
  dashboardsRaw: ""

envFile:
  # Optional override. If empty, chart falls back to files/deploy-elasticsearch.envfile.
  # Use:
  #   --set-file envFile.raw=./deploy/elasticsearch.env
  raw: ""
  # Only these shared values are read from deploy/elasticsearch.env.
  # Kubernetes-specific discovery and publish-host values are generated by the chart.
  includeKeys:
    - ELASTICSEARCH_CLUSTER_NAME
    - ELASTICSEARCH_JAVA_OPTS
    - OPENSEARCH_JAVA_OPTS
    - KIBANA_SERVER_NAME

usersEnvFile:
  # Optional override. If empty, chart falls back to files/users-elasticsearch.envfile.
  # Use:
  #   --set-file usersEnvFile.raw=./security/env/users_elasticsearch.env
  raw: ""
  # Only these keys are imported into the credentials Secret.
  includeKeys:
    - OPENSEARCH_INITIAL_ADMIN_PASSWORD
    - KIBANA_USER
    - KIBANA_PASSWORD

certificatesEnvFile:
  # Optional override. If empty, chart falls back to files/certificates-elasticsearch.envfile.
  # Use:
  #   --set-file certificatesEnvFile.raw=./security/env/certificates_elasticsearch.env
  raw: ""
  # Only keys listed here are imported from certificates env.
  includeKeys:
    - ES_CLIENT_CERT_NAME

opensearch:
  enabled: true
  replicas: 3
  image:
    repository: opensearchproject/opensearch
    tag: "3.5.0"
    pullPolicy: IfNotPresent
  clusterName: elasticsearch-cogstack-cluster
  javaOpts: "-Xms512m -Xmx512m -Des.failure_store_feature_flag_enabled=true"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "1Gi"
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    storageClassName: ""
  logPersistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
  performanceAnalyzerPersistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
  snapshotBackups:
    # Optional parity mounts for Docker's shared backup paths.
    # These should use shared storage accessible from all OpenSearch pods.
    # Note: OpenSearch will only use these if path.repo is also configured in opensearch.yml.
    enabled: false
    data:
      mountPath: /mnt/es_data_backups
      existingClaim: ""
      accessModes:
        - ReadWriteMany
      size: 20Gi
      storageClassName: ""
    config:
      mountPath: /mnt/es_config_backups
      existingClaim: ""
      accessModes:
        - ReadWriteMany
      size: 5Gi
      storageClassName: ""
  service:
    type: ClusterIP
    httpPort: 9200
    transportPort: 9300
    analyzerPort: 9600
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

dashboards:
  enabled: true
  replicas: 1
  # When opensearch.enabled=false, set external OpenSearch URLs here.
  # Example:
  # opensearchHosts:
  #   - https://opensearch-client.cogstack.svc:9200
  opensearchHosts: []
  image:
    repository: opensearchproject/opensearch-dashboards
    tag: "3.5.0"
    pullPolicy: IfNotPresent
  serverName: cogstack-kibana
  service:
    type: ClusterIP
    port: 5601
    annotations: {}
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

credentials:
  create: true
  existingSecret: ""
  adminPassword: "Kibanaserver!1"
  kibanaUser: kibanaserver
  kibanaPassword: kibanaserver

securityFiles:
  # Optional overrides. If empty, chart falls back to files/opensearch-security/*.
  # Use:
  #   --set-file securityFiles.configRaw=./security/es_roles/opensearch/config.yml
  #   --set-file securityFiles.internalUsersRaw=./security/es_roles/opensearch/internal_users.yml
  #   --set-file securityFiles.rolesRaw=./security/es_roles/opensearch/roles.yml
  #   --set-file securityFiles.rolesMappingRaw=./security/es_roles/opensearch/roles_mapping.yml
  configRaw: ""
  internalUsersRaw: ""
  rolesRaw: ""
  rolesMappingRaw: ""

certificates:
  opensearchSecretName: opensearch-certs
  dashboardsSecretName: opensearch-certs
  opensearchFiles:
    # Secret key names for shared OpenSearch cert material.
    # These align with files under security/certificates/elastic/opensearch/.
    rootCA: elastic-stack-ca.crt.pem
    nodeCert: esnode.crt
    nodeKey: esnode.key
    adminCert: admin.crt
    adminKey: admin.key.pem
  opensearchNodeFiles:
    # Optional per-pod node cert/key mapping using repo-style file names.
    # Pod ordinal 0 uses the first entry, 1 uses the second, etc.
    # If you set this to an empty list, the chart falls back to opensearchFiles.nodeCert/nodeKey.
    - cert: elasticsearch-1.crt
      key: elasticsearch-1.key
    - cert: elasticsearch-2.crt
      key: elasticsearch-2.key
    - cert: elasticsearch-3.crt
      key: elasticsearch-3.key
  dashboardsFiles:
    # Secret key names for Dashboards cert material.
    rootCA: elastic-stack-ca.crt.pem
    adminCert: admin.crt
    adminKey: admin.key.pem
    serverCert: es_kibana_client.pem
    serverKey: es_kibana_client.key
