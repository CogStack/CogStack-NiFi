{{- if and .Values.credentials.create (not .Values.credentials.existingSecret) }}
{{- $usersData := dict -}}
{{- if .Values.usersEnvFile.raw }}
{{- $renderedUsers := tpl .Values.usersEnvFile.raw . -}}
{{- range $line := splitList "\n" $renderedUsers }}
  {{- $clean := trim (replace "\r" "" $line) -}}
  {{- if and $clean (not (hasPrefix "#" $clean)) -}}
    {{- if regexMatch "^[A-Za-z_][A-Za-z0-9_]*=" $clean -}}
      {{- $key := regexFind "^[A-Za-z_][A-Za-z0-9_]*" $clean -}}
      {{- $val := trim (regexReplaceAll "^[A-Za-z_][A-Za-z0-9_]*=" $clean "") -}}
      {{- if has $key $.Values.usersEnvFile.includeKeys -}}
        {{- if and (hasPrefix "\"" $val) (hasSuffix "\"" $val) -}}
          {{- $val = trimSuffix "\"" (trimPrefix "\"" $val) -}}
        {{- else if and (hasPrefix "'" $val) (hasSuffix "'" $val) -}}
          {{- $val = trimSuffix "'" (trimPrefix "'" $val) -}}
        {{- end -}}
        {{- $_ := set $usersData $key $val -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end }}
{{- end }}
{{- $adminPassword := .Values.credentials.adminPassword -}}
{{- if hasKey $usersData "OPENSEARCH_INITIAL_ADMIN_PASSWORD" -}}
{{- $adminPassword = index $usersData "OPENSEARCH_INITIAL_ADMIN_PASSWORD" -}}
{{- end -}}
{{- $kibanaUser := .Values.credentials.kibanaUser -}}
{{- if hasKey $usersData "KIBANA_USER" -}}
{{- $kibanaUser = index $usersData "KIBANA_USER" -}}
{{- end -}}
{{- $kibanaPassword := .Values.credentials.kibanaPassword -}}
{{- if hasKey $usersData "KIBANA_PASSWORD" -}}
{{- $kibanaPassword = index $usersData "KIBANA_PASSWORD" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cogstack-opensearch.credentialsSecretName" . }}
  labels:
    {{- include "cogstack-opensearch.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  KIBANA_USER: {{ $kibanaUser | quote }}
  KIBANA_PASSWORD: {{ $kibanaPassword | quote }}
{{- end }}
