{{- if .Values.dashboards.enabled }}
{{- $dashboardsConfigRaw := .Values.configFiles.dashboardsRaw | default (.Files.Get "files/opensearch_dashboards.yml") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cogstack-opensearch.fullname" . }}-dashboards-config
  labels:
    {{- include "cogstack-opensearch.labels" . | nindent 4 }}
data:
  opensearch_dashboards.yml: |
{{ $dashboardsConfigRaw | indent 4 }}
{{- end }}
