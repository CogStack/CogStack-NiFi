{{- $envData := include "cogstack-nifi.parsedEnvFile" . | fromYaml | default (dict) -}}
{{- $httpsPort := int .Values.service.httpsPort -}}
{{- if hasKey $envData "NIFI_INTERNAL_PORT" -}}
{{- $httpsPort = int (index $envData "NIFI_INTERNAL_PORT") -}}
{{- end -}}
{{- $siteToSitePort := int .Values.service.siteToSitePort -}}
{{- if hasKey $envData "NIFI_INPUT_SOCKET_PORT" -}}
{{- $siteToSitePort = int (index $envData "NIFI_INPUT_SOCKET_PORT") -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cogstack-nifi.serviceName" . }}
  labels:
    {{- include "cogstack-nifi.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.sessionAffinity }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  {{- end }}
  ports:
    - name: https
      port: {{ $httpsPort }}
      targetPort: https
      protocol: TCP
    - name: site-to-site
      port: {{ $siteToSitePort }}
      targetPort: site-to-site
      protocol: TCP
  selector:
    {{- include "cogstack-nifi.selectorLabels" . | nindent 4 }}
