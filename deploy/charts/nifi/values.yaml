nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: cogstacksystems/cogstack-nifi
  tag: latest
  pullPolicy: IfNotPresent

envFile:
  # Optional override. If empty, chart falls back to files/deploy-nifi.envfile.
  # Only the allow-listed keys below are imported from deploy/nifi.env.
  raw: ""
  includeKeys:
    - NIFI_DOCKER_IMAGE
    - NIFI_DOCKER_CPU_MIN
    - NIFI_DOCKER_CPU_MAX
    - NIFI_DOCKER_RAM
    - NIFI_JVM_OPTS
    - NIFI_JVM_HEAP_INIT
    - NIFI_JVM_HEAP_MAX
    - NIFI_WEB_PROXY_CONTEXT_PATH
    - NIFI_WEB_PROXY_HOST
    - NIFI_INTERNAL_PORT
    - NIFI_INPUT_SOCKET_PORT
    - NIFI_UID
    - NIFI_GID
    - NIFI_KEYSTORE_PATH
    - NIFI_TRUSTSTORE_PATH
    - NIFI_KEYSTORE_TYPE
    - NIFI_TRUSTSTORE_TYPE
    - NIFI_PYTHON_FRAMEWORK_SOURCE_DIRECTORY
    - NIFI_PYTHON_EXTENSIONS_SOURCE_DIRECTORY_DEFAULT
    - NIFI_PYTHON_WORKING_DIRECTORY
    - NIFI_PYTHONPATH
    - NIFI_LOG_LEVEL

certificatesEnvFile:
  # Optional override. If empty, chart falls back to files/certificates-nifi.envfile.
  raw: ""
  includeKeys:
    - NIFI_KEYSTORE_PASSWORD
    - NIFI_KEY_PASSWORD
    - NIFI_TRUSTSTORE_PASSWORD
    - NIFI_SENSITIVE_PROPS_KEY

usersEnvFile:
  # Optional override. If empty, chart falls back to files/users-nifi.envfile.
  raw: ""
  includeKeys:
    - NIFI_SINGLE_USER_CREDENTIALS_USERNAME
    - NIFI_SINGLE_USER_CREDENTIALS_PASSWORD

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

initSecurityContext: {}

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 1Gi

terminationGracePeriodSeconds: 120

nifi:
  home: /opt/nifi/nifi-current
  bootstrapFromImage:
    enabled: true
    # The CogStack image keeps the repository NiFi assets here because the Dockerfile
    # copies the local nifi/ package before installing it.
    sourceRoot: /tmp/cogstack_nifi/nifi
    # Keep false for normal persistent deployments. Set true to refresh conf/scripts
    # from a new image when you are prepared to overwrite runtime edits in the PVCs.
    overwriteExistingConfig: false
    overwriteExistingResources: false
  jvm:
    heapInit: 768m
    heapMax: 1g
  web:
    httpsPort: 8443
    proxyContextPath: /nifi
    proxyHost: localhost:8443
    additionalProxyHosts: []
  remoteInput:
    socketPort: 10000
  python:
    frameworkSourceDirectory: /opt/nifi/nifi-current/python/framework
    extensionsSourceDirectory: /opt/nifi/nifi-current/python_extensions
    workingDirectory: /opt/nifi/user_scripts
  security:
    authorizer: single-user-authorizer
    loginIdentityProvider: single-user-provider
    keystoreType: JKS
    truststoreType: JKS
  cluster:
    enabled: false
    nodeProtocolPort: 11443
    loadBalancePort: 6342
    leasePrefix: ""
    configMapNamePrefix: ""
    flowElectionMaxWaitTime: "5 mins"
    flowElectionMaxCandidates: ""

certificates:
  enabled: true
  existingSecret: nifi-certs
  mountPath: /security/certificates/nifi
  files:
    keystore: nifi-keystore.jks
    truststore: nifi-truststore.jks

sensitiveConfig:
  # Keep TLS passwords and nifi.sensitive.props.key in Kubernetes Secret data,
  # not in chart values and not in container images.
  create: true
  existingSecret: ""
  keys:
    sensitivePropsKey: nifi-sensitive-props-key
    keystorePassword: nifi-keystore-password
    keyPassword: nifi-key-password
    truststorePassword: nifi-truststore-password
    singleUserUsername: nifi-single-user-username
    singleUserPassword: nifi-single-user-password

service:
  type: ClusterIP
  httpsPort: 8443
  siteToSitePort: 10000
  annotations: {}
  sessionAffinity: ClientIP

headlessService:
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nifi.local
      paths:
        - path: /nifi
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  conf:
    enabled: true
    size: 1Gi
    storageClassName: ""
  logs:
    enabled: true
    size: 10Gi
    storageClassName: ""
  provenance:
    enabled: true
    size: 20Gi
    storageClassName: ""
  database:
    enabled: true
    size: 5Gi
    storageClassName: ""
  flowfile:
    enabled: true
    size: 20Gi
    storageClassName: ""
  content:
    enabled: true
    size: 50Gi
    storageClassName: ""
  state:
    enabled: true
    size: 5Gi
    storageClassName: ""
  flowfileErrors:
    enabled: true
    size: 10Gi
    storageClassName: ""
  userScripts:
    enabled: true
    size: 5Gi
    storageClassName: ""
  pythonExtensions:
    enabled: true
    size: 1Gi
    storageClassName: ""

dataVolume:
  enabled: true
  mountPath: /data
  existingClaim: ""
  emptyDir: {}

modelsVolume:
  enabled: false
  mountPath: /opt/models
  existingClaim: ""
  emptyDir: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
